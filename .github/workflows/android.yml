name: Android CI & Deploy Page

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: android_companion_app

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: android_companion_app

    - name: Prepare Deployment Directory
      run: |
        mkdir deploy
        cp index.html deploy/
        cp android_companion_app/app/build/outputs/apk/debug/app-debug.apk deploy/deskbuddy.apk

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: deploy
        branch: gh-pages
